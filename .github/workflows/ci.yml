name: OrangeHRM Automation Tests

# Run on pushes, PRs to main, or manual trigger
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    name: "API Tests + HTML Report"

    steps:
      # Step 1: Checkout repository
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: "🐍 Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Step 3: Install dependencies
      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Install Chrome browser
      - name: "🌐 Install Google Chrome"
        uses: browser-actions/setup-chrome@v1

      # Step 4b: Ensure ChromeDriver is executable (Linux fix)
      - name: "🔧 Fix ChromeDriver permissions"
        run: chmod +x ~/.wdm/drivers/chromedriver/linux64/*/chromedriver

      # Step 5: Create reports directory
      - name: "📁 Create reports directory"
        run: mkdir -p reports

      # Step 6: Run API tests
      - name: "🧪 Run API tests"
        run: pytest tests/test_api_candidates.py -v --tb=short

      # Step 7: Upload HTML report artifact
      - name: "📊 Upload HTML test report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "test-report-${{ github.run_number }}"
          path: reports/report.html
          retention-days: 30

      # Step 8: Print test summary
      - name: "📋 Test summary"
        if: always()
        run: |
          echo "================================"
          echo "  Test run complete"
          echo "  Report: reports/report.html"
          echo "  Artifact: test-report-${{ github.run_number }}"
          echo "================================"