# .github/workflows/ci.yml

name: OrangeHRM Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    name: "API Tests + HTML Report"

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Install dependencies"
        run: pip install -r requirements.txt

      - name: "🌐 Install Google Chrome"
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
        id: setup-chrome

      - name: "🔧 Install matching ChromeDriver"
        run: |
          # WHY this approach instead of WebDriver Manager:
          #   WebDriver Manager has a bug on Linux CI — it downloads the zip,
          #   extracts it, but then points Selenium to a text file
          #   (THIRD_PARTY_NOTICES.chromedriver) instead of the binary.
          #   
          #   The reliable fix: use chrome-for-testing to get the exact
          #   chromedriver that matches the installed Chrome version.
          #   We find the Chrome version, download the matching chromedriver,
          #   and put it on PATH so Selenium finds it automatically.

          # Get installed Chrome version
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          echo "Chrome version: $CHROME_VERSION"

          # Download matching chromedriver from Chrome for Testing
          CHROMEDRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
          echo "Downloading: $CHROMEDRIVER_URL"

          wget -q "$CHROMEDRIVER_URL" -O chromedriver.zip
          unzip -q chromedriver.zip
          
          # Move the binary to /usr/local/bin so it is on PATH
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          
          # Verify it works
          chromedriver --version
          echo "ChromeDriver installed successfully ✓"

      - name: "📁 Create reports directory"
        run: mkdir -p reports

      - name: "🧪 Run API tests"
        run: pytest tests/test_api_candidates.py -v --tb=short
        env:
          # WHY set PYTHONPATH:
          #   Ensures imports like 'from api.candidates_api import CandidatesAPI'
          #   resolve correctly when pytest runs on the CI VM
          PYTHONPATH: .

      - name: "📊 Upload HTML test report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "test-report-${{ github.run_number }}"
          path: reports/report.html
          retention-days: 30

      - name: "📋 Test summary"
        if: always()
        run: |
          echo "================================"
          echo "  Test run ${{ github.run_number }} complete"
          echo "  Report uploaded as artifact"
          echo "================================"